<svg xmlns="http://www.w3.org/2000/svg" width="350" height="120" viewBox="0 0 350 120">
    <defs>
        <linearGradient id="gold-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#e3ba4b" />
            <stop offset="100%" stop-color="#c49525" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.3"/>
        </filter>
    </defs>
    
    <!-- Gold Pill Shape -->
    <rect x="15" y="15" width="320" height="80" rx="40" ry="40" fill="url(#gold-grad)" stroke="#ecd078" stroke-width="4" filter="url(#shadow)"/>
    
    <!-- Text -->
    <text x="175" y="67" font-family="'Montserrat', sans-serif" font-weight="900" font-size="34" fill="#0D1B3E" text-anchor="middle" letter-spacing="1">APPLY NOW</text>
</svg>
